<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Treino</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#000;color:#fff;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}

/* CONFIG */
.cfg-banner{background:#1a1a00;border:1px solid #444400;border-radius:12px;padding:14px 16px;margin:16px;display:flex;align-items:flex-start;gap:10px}
.cfg-banner.hidden{display:none}
.cfg-text{flex:1;font-size:13px;color:#ccc;line-height:1.5}
.cfg-text b{color:#ffd166}
.cfg-inp{width:100%;background:#111;border:1px solid #444;border-radius:8px;padding:9px 12px;color:#fff;font-size:12px;margin-top:8px;font-family:monospace}
.cfg-inp:focus{outline:none;border-color:#3b82f6}
.cfg-btn{background:#3b82f6;border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;width:100%}

/* NAVBAR */
.navbar{background:#111;padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #222;position:sticky;top:0;z-index:100}
.nav-title{font-size:22px;font-weight:700;letter-spacing:-.3px}
.nav-acts{display:flex;gap:8px}
.nav-btn{background:#222;border:none;color:#fff;width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:active{opacity:.7}
.nav-back{background:none;border:none;color:#3b82f6;font-size:22px;cursor:pointer;padding:0 8px 0 0;line-height:1}

/* BOTTOM NAV */
.btm-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#111;border-top:1px solid #222;display:flex;padding:8px 0 16px}
.btm-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:#666;cursor:pointer;border:none;background:transparent;padding:4px 0;transition:color .15s}
.btm-tab .ti{font-size:22px}
.btm-tab.active{color:#3b82f6}

/* PAGES */
.page{display:none;padding:16px}
.page.active{display:block}

/* ROTINAS */
.btn-row{display:flex;gap:10px;margin-bottom:20px}
.btn-act{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-act:active{opacity:.7}
.sec-label{font-size:13px;font-weight:600;color:#aaa;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rot-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:16px;margin-bottom:12px}
.rot-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.rot-card-name{font-size:16px;font-weight:700}
.rot-more{color:#555;font-size:20px;background:transparent;border:none;cursor:pointer;padding:0 4px;line-height:1}
.rot-card-exs{font-size:13px;color:#777;margin-bottom:14px;line-height:1.4}
.btn-iniciar{width:100%;background:#3b82f6;border:none;color:#fff;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-iniciar:active{background:#2563eb;transform:scale(.98)}
.treino-letras{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.btn-letra{background:#1a2a3a;border:1px solid #2a4a6a;color:#3b82f6;padding:9px 6px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;flex:1;min-width:40px}

/* TREINO ATIVO */
.ta-bar{background:#111;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #222;position:sticky;top:56px;z-index:50}
.ta-left{display:flex;align-items:center;gap:8px}
.ta-info{display:flex;flex-direction:column}
.ta-aluno{font-size:11px;color:#555}
.ta-title{font-size:15px;font-weight:700}
.btn-concluir{background:#3b82f6;border:none;color:#fff;padding:8px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.stats-bar{background:#111;padding:10px 16px;display:flex;gap:24px;border-bottom:1px solid #1a1a1a;position:sticky;top:108px;z-index:49}
.sb-item{display:flex;flex-direction:column;gap:2px}
.sb-val{font-size:14px;font-weight:600;color:#3b82f6}
.sb-lbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px}
.ex-block{border-bottom:1px solid #1a1a1a;padding:16px}
.ex-block-name{font-size:16px;font-weight:700;color:#3b82f6;margin-bottom:3px}
.ex-block-ref{font-size:12px;color:#555;margin-bottom:12px}
.col-hdrs{display:grid;grid-template-columns:32px 1fr 72px 72px 40px;gap:4px;padding:0 4px;margin-bottom:6px}
.col-hdrs span{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;text-align:center}
.col-hdrs span:first-child{text-align:left}
.s-row{display:grid;grid-template-columns:32px 1fr 72px 72px 40px;gap:4px;align-items:center;padding:4px;border-radius:8px;margin-bottom:4px;transition:background .2s}
.s-row.done{background:rgba(59,130,246,.08)}
.s-badge{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#222;color:#888}
.s-badge.done{background:rgba(59,130,246,.2);color:#3b82f6}
.s-prev{font-size:12px;color:#555;text-align:center}
.s-inp{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:7px 4px;color:#fff;font-size:15px;font-weight:600;text-align:center;width:100%;-webkit-appearance:none}
.s-inp:focus{outline:none;border-color:#3b82f6;background:#111}
.s-inp[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.s-inp.filled{background:#1a2a3a;border-color:#2a4a6a}
.s-chk{width:32px;height:32px;border-radius:8px;border:2px solid #333;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin:0 auto;font-size:0}
.s-chk.checked{background:#3b82f6;border-color:#3b82f6;font-size:16px}
.s-chk.checked::after{content:'✓';color:#fff;font-weight:700}
.btn-add-s{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#888;padding:11px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add-s:active{background:#222}

/* ALUNOS */
.aluno-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:0;margin-bottom:12px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.aluno-card:active{border-color:#3b82f6}
.aluno-card-top{padding:16px;display:flex;align-items:center;gap:14px}
.aluno-avatar{width:48px;height:48px;border-radius:24px;background:linear-gradient(135deg,#1a3a6a,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.aluno-info{flex:1}
.aluno-name{font-size:16px;font-weight:700;margin-bottom:3px}
.aluno-sub{font-size:12px;color:#666}
.aluno-obs{font-size:11px;color:#ef4444;margin-top:2px}
.aluno-stats{display:flex;gap:0;border-top:1px solid #222}
.aluno-stat{flex:1;padding:10px 8px;text-align:center;border-right:1px solid #222}
.aluno-stat:last-child{border-right:none}
.aluno-stat-val{font-size:16px;font-weight:700;color:#3b82f6}
.aluno-stat-lbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* PERFIL DO ALUNO */
.perfil-header{padding:20px 16px;border-bottom:1px solid #222}
.perfil-name{font-size:22px;font-weight:800;margin-bottom:4px}
.perfil-obj{font-size:14px;color:#3b82f6;font-weight:600;margin-bottom:8px}
.perfil-dados{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.perfil-dado{background:#1a1a1a;border-radius:8px;padding:10px 12px}
.perfil-dado-lbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.perfil-dado-val{font-size:13px;font-weight:600}
.perfil-section{padding:16px}
.perfil-section-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

/* VOLUME TABELA */
.vol-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.vol-filter-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#666;padding:5px 10px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.vol-filter-btn.active{background:rgba(59,130,246,.2);border-color:#3b82f6;color:#3b82f6}
.vol-table{width:100%;border-collapse:collapse;font-size:12px}
.vol-table th{background:#1a1a1a;padding:8px 6px;text-align:center;font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid #222;white-space:nowrap}
.vol-table th:first-child{text-align:left;padding-left:8px}
.vol-table td{padding:8px 6px;text-align:center;border-bottom:1px solid #111;font-size:12px}
.vol-table td:first-child{text-align:left;padding-left:8px;font-weight:600;color:#aaa;white-space:nowrap}
.vol-table tr:last-child td{border-bottom:none}
.vol-val{display:inline-block;min-width:24px;padding:2px 6px;border-radius:4px;font-weight:700}
.vol-0{color:#333}
.vol-low{background:rgba(59,130,246,.1);color:#3b82f6}
.vol-mid{background:rgba(59,130,246,.2);color:#60a5fa}
.vol-high{background:rgba(59,130,246,.4);color:#93c5fd}
.vol-over{background:rgba(239,68,68,.2);color:#f87171}

/* GRÁFICO VOLUME */
.chart-wrap{margin-top:16px;background:#1a1a1a;border-radius:12px;padding:14px}
.chart-title{font-size:13px;font-weight:600;color:#aaa;margin-bottom:12px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:80px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{width:100%;background:#3b82f6;border-radius:3px 3px 0 0;transition:height .3s;min-height:2px}
.chart-bar-lbl{font-size:9px;color:#555;white-space:nowrap}
.chart-bar-val{font-size:10px;color:#3b82f6;font-weight:600}

/* HISTÓRICO NO PERFIL */
.hist-item{background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:10px}
.hist-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hist-item-name{font-size:15px;font-weight:700}
.hist-item-date{font-size:12px;color:#555}
.hist-item-stats{display:flex;gap:16px}
.hist-item-stat{display:flex;flex-direction:column;gap:2px}
.hist-item-stat-val{font-size:14px;font-weight:600;color:#3b82f6}
.hist-item-stat-lbl{font-size:10px;color:#555}
.hist-item-exs{font-size:12px;color:#666;margin-top:6px}

/* BIBLIOTECA */
.bib-group{margin-bottom:16px}
.bib-group-name{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.bib-item{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.bib-name{font-size:14px;font-weight:600;margin-bottom:2px}
.bib-sub{font-size:12px;color:#555}

/* HISTÓRICO GERAL */
.hist-date{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px}
.hist-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:8px}
.hist-ex-name{font-size:14px;font-weight:700;color:#3b82f6;margin-bottom:10px}

/* EMPTY */
.empty{text-align:center;padding:50px 20px}
.empty-ico{font-size:44px;margin-bottom:14px}
.empty-t{font-size:17px;font-weight:700;color:#555;margin-bottom:6px}
.empty-s{font-size:13px;color:#333}

/* SHEETS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex;animation:fo .2s}
@keyframes fo{from{opacity:0}to{opacity:1}}
.sheet{background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;animation:su .25s ease;max-height:92vh;overflow-y:auto}
@keyframes su{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.sh-handle{width:40px;height:4px;background:#333;border-radius:2px;margin:0 auto 18px}
.sh-title{font-size:18px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.sh-x{background:none;border:none;color:#555;font-size:22px;cursor:pointer;line-height:1;padding:0}
.f-lbl{font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;margin-top:14px}
.f-inp{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;color:#fff;font-size:15px}
.f-inp:focus{outline:none;border-color:#3b82f6}
.f-inp::placeholder{color:#444}
.f-sel{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;appearance:none;-webkit-appearance:none;cursor:pointer}
.f-sel:focus{outline:none;border-color:#3b82f6}
.f-row2{display:flex;gap:8px}
.f-row2 > div{flex:1}
.btn-sh-ok{width:100%;background:#3b82f6;border:none;color:#fff;padding:14px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:18px}
.btn-sh-ok:active{background:#2563eb}
.divider{height:1px;background:#222;margin:16px 0}
.lbl-sec{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:block}
.srch-inp{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;margin-bottom:12px}
.srch-inp:focus{outline:none;border-color:#3b82f6}
.srch-inp::placeholder{color:#444}
.srch-item{background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.srch-item:active{background:#1a2a3a}
.et-item{background:#111;border:1px solid #222;border-radius:10px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.t-item{background:#111;border-radius:10px;padding:12px 14px;margin-top:8px;display:flex;align-items:center;gap:12px}
.t-letra{font-size:24px;font-weight:800;color:#3b82f6;width:28px;flex-shrink:0}
.t-info{flex:1}
.t-nome{font-size:14px;font-weight:600;margin-bottom:2px}
.t-foco{font-size:12px;color:#666}
.t-badge{background:rgba(59,130,246,.15);color:#3b82f6;font-size:11px;font-weight:700;padding:3px 8px;border-radius:100px}
.icon-del{background:none;border:none;color:#444;font-size:16px;cursor:pointer;padding:4px}
.icon-del:active{color:#ef4444}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.ativa-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;margin-right:4px;vertical-align:middle}
</style>
</head>
<body>

<!-- CONFIG -->
<div class="cfg-banner" id="cfg-banner">
  <div style="font-size:20px;flex-shrink:0">⚙️</div>
  <div class="cfg-text">
    <b>Configure a URL do Apps Script</b><br>
    Cole a URL do Web App publicado no Google Apps Script.
    <input class="cfg-inp" id="cfg-url" placeholder="https://script.google.com/macros/s/...">
    <button class="cfg-btn" onclick="salvarConfig()">💾 Salvar e Conectar</button>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar" id="navbar">
  <div style="display:flex;align-items:center;gap:4px">
    <button class="nav-back" id="nav-back" style="display:none" onclick="voltarPagina()">‹</button>
    <div class="nav-title" id="nav-title">Treino</div>
  </div>
  <div class="nav-acts">
    <button class="nav-btn" id="btn-sync" onclick="syncAll()" title="Sincronizar">🔄</button>
    <button class="nav-btn" id="btn-add-nav" style="display:none" onclick="navAddAction()">＋</button>
  </div>
</div>

<!-- PAGES -->
<div class="page active" id="page-rotinas">
  <div class="btn-row">
    <button class="btn-act" onclick="openSheet('sh-nova-rotina')">📋 Nova Rotina</button>
    <button class="btn-act" onclick="goTab('biblioteca')">🔍 Exercícios</button>
  </div>
  <div class="sec-label">▼ <span id="rot-lbl">Minhas Rotinas</span></div>
  <div id="rotinas-list"></div>
</div>

<div class="page" id="page-treino">
  <div id="treino-content"></div>
</div>

<div class="page" id="page-alunos">
  <div id="alunos-list"></div>
</div>

<div class="page" id="page-perfil">
  <div id="perfil-content"></div>
</div>

<div class="page" id="page-biblioteca">
  <input class="srch-inp" id="srch-bib" placeholder="🔍 Buscar exercício..." oninput="renderBib()" style="margin-bottom:14px">
  <div id="bib-list"></div>
</div>

<div class="page" id="page-hist">
  <div id="hist-list"></div>
</div>

<!-- BOTTOM NAV -->
<div class="btm-nav">
  <button class="btm-tab active" onclick="goTab('rotinas')"><span class="ti">🏠</span>Início</button>
  <button class="btm-tab" onclick="goTab('rotinas')"><span class="ti">🏋️</span>Treino</button>
  <button class="btm-tab" onclick="goTab('alunos')"><span class="ti">👥</span>Alunos</button>
  <button class="btm-tab" onclick="goTab('hist')"><span class="ti">📊</span>Histórico</button>
</div>

<!-- SHEETS -->

<!-- Nova Rotina -->
<div class="overlay" id="sh-nova-rotina">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title">Nova Rotina <button class="sh-x" onclick="closeSheet('sh-nova-rotina')">✕</button></div>
    <label class="f-lbl">Aluno</label><select class="f-sel" id="nr-aluno"></select>
    <label class="f-lbl">Nome da Rotina</label><input class="f-inp" id="nr-nome" placeholder="Ex: Hipertrofia Fase 2">
    <div class="f-row2">
      <div><label class="f-lbl">Início</label><input type="date" class="f-inp" id="nr-ini"></div>
      <div><label class="f-lbl">Fim</label><input type="date" class="f-inp" id="nr-fim"></div>
    </div>
    <button class="btn-sh-ok" onclick="salvarRotina()">Criar Rotina</button>
  </div>
</div>

<!-- Novo/Editar Aluno -->
<div class="overlay" id="sh-aluno">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title"><span id="sh-aluno-t">Novo Aluno</span><button class="sh-x" onclick="closeSheet('sh-aluno')">✕</button></div>
    <input type="hidden" id="sh-aluno-id">
    <label class="f-lbl">Nome completo *</label><input class="f-inp" id="al-nome" placeholder="Ex: João Silva">
    <div class="f-row2">
      <div><label class="f-lbl">Email</label><input class="f-inp" id="al-email" placeholder="email@..." type="email"></div>
      <div><label class="f-lbl">Telefone</label><input class="f-inp" id="al-tel" placeholder="(11) 99999-0000"></div>
    </div>
    <div class="f-row2">
      <div><label class="f-lbl">Data de Nascimento</label><input type="date" class="f-inp" id="al-nasc"></div>
      <div><label class="f-lbl">Objetivo</label>
        <select class="f-sel" id="al-obj">
          <option>Hipertrofia</option><option>Emagrecimento</option><option>Condicionamento</option><option>Força</option><option>Reabilitação</option>
        </select>
      </div>
    </div>
    <label class="f-lbl">Observações / Restrições</label><input class="f-inp" id="al-obs" placeholder="Ex: Lesão no joelho...">
    <label class="f-lbl">Status</label>
    <select class="f-sel" id="al-ativo"><option value="Sim">Ativo</option><option value="Não">Inativo</option></select>
    <button class="btn-sh-ok" onclick="salvarAluno()">Salvar</button>
  </div>
</div>

<!-- Gerenciar Rotina -->
<div class="overlay" id="sh-rotina">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title"><span id="sh-rot-t">Rotina</span><button class="sh-x" onclick="closeSheet('sh-rotina')">✕</button></div>

<script>
// ══ CONFIG ══
let API_URL = localStorage.getItem('pt_api_url') || '';

function salvarConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  if (!url.startsWith('https://script.google.com')) { toast('URL inválida!', '#ef4444'); return; }
  API_URL = url;
  localStorage.setItem('pt_api_url', url);
  document.getElementById('cfg-banner').classList.add('hidden');
  toast('✓ Conectado!', '#22c55e');
  syncAll();
}

function checkConfig() {
  if (!API_URL) document.getElementById('cfg-banner').classList.remove('hidden');
  else document.getElementById('cfg-banner').classList.add('hidden');
}

// ══ STORAGE ══
const ld = (k,d) => { try { return JSON.parse(localStorage.getItem(k))||d; } catch { return d; } };
const sv = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const today = () => new Date().toLocaleDateString('pt-BR');

const DB = {
  alunos: ld('pt_alunos', []),
  rotinas: ld('pt_rotinas', []),
  treinos: ld('pt_treinos', []),
  et: ld('pt_et', []),
  exercicios: ld('pt_exercicios', []),
  exec: ld('pt_exec', []),
};

const persist = () => {
  sv('pt_alunos',DB.alunos); sv('pt_rotinas',DB.rotinas); sv('pt_treinos',DB.treinos);
  sv('pt_et',DB.et); sv('pt_exercicios',DB.exercicios); sv('pt_exec',DB.exec);
};

// ══ API (JSONP) ══
function apiGet(action, params={}) {
  return new Promise(resolve => {
    if (!API_URL) { resolve(null); return; }
    const cb = 'cb_'+Date.now();
    const qs = new URLSearchParams({action, callback:cb, ...params});
    const s = document.createElement('script');
    const t = setTimeout(() => { delete window[cb]; s.remove(); resolve(null); }, 10000);
    window[cb] = data => { clearTimeout(t); delete window[cb]; s.remove(); resolve(data); };
    s.src = `${API_URL}?${qs}`; s.onerror = () => { clearTimeout(t); resolve(null); };
    document.body.appendChild(s);
  });
}

function apiPost(action, data) {
  return new Promise(resolve => {
    if (!API_URL) { resolve(null); return; }
    const cb = 'cb_'+Date.now();
    const payload = encodeURIComponent(JSON.stringify(data));
    const qs = new URLSearchParams({action, callback:cb, payload});
    const s = document.createElement('script');
    const t = setTimeout(() => { delete window[cb]; s.remove(); resolve(null); }, 10000);
    window[cb] = data => { clearTimeout(t); delete window[cb]; s.remove(); resolve(data); };
    s.src = `${API_URL}?${qs}`; s.onerror = () => { clearTimeout(t); resolve(null); };
    document.body.appendChild(s);
  });
}

// ══ SYNC ══
async function syncAll() {
  if (!API_URL) return;
  document.getElementById('btn-sync').textContent = '⏳';
  try {
    const [alunos, rotinas, treinos, et, exercicios, exec] = await Promise.all([
      apiGet('getAlunos'), apiGet('getRotinas'), apiGet('getTreinos'),
      apiGet('getExercTreino'), apiGet('getExercicios'), apiGet('getExecucao')
    ]);

    if (alunos) DB.alunos = alunos.map(r => ({
      id: r.ID_Aluno, nome: r.Nome, email: r.Email||'', tel: r.Telefone||'',
      nasc: r.Data_Nasc||'', obj: r.Objetivo||'', obs: r.Obs||'', ativo: r.Ativo||'Sim'
    }));

    if (rotinas) DB.rotinas = rotinas.map(r => ({
      id: r.ID_Rotina, id_aluno: r.ID_Aluno, nome: r.Nome_Rotina||r.Nome||'',
      ini: r.Data_Inicio||'', fim: r.Data_Fim||'', ativa: r.Ativa==='Sim'||r.Ativa===true, obs: r.Obs||''
    }));

    if (treinos) DB.treinos = treinos.map(r => ({
      id: r.ID_Treino, id_rotina: r.ID_Rotina,
      letra: r.Letra_Treino||'', foco: r.Nome_Treino||r.Foco_Muscular||'',
      ordem: parseInt(r.Ordem)||0
    }));

    if (et) DB.et = et.map(r => ({
      id: r.ID_ExercTreino, id_treino: r.ID_Treino, id_ex: String(r.ID_Exercicio),
      nome: r.Nome_Exercicio||'', series: parseInt(r.Series_Prog)||3,
      rmin: parseInt(r.Reps_Min)||8, rmax: parseInt(r.Reps_Max)||12,
      carga: r.Carga_Referencia||'—', ordem: parseInt(r.Ordem)||1
    }));

    if (exercicios) DB.exercicios = exercicios.map(r => ({
      id: String(r.ID_Exercicio), nome: r.Nome||r.Nome_Exercicio||'',
      grupo: r.Grupo_Muscular||'', equip: r.Equipamento||'',
      coef: {
        Peito: parseFloat(r.Peito)||0, 'Upper back': parseFloat(r['Upper back'])||0,
        Latissimo: parseFloat(r.Latissimo)||0, 'Bíceps': parseFloat(r['Bíceps'])||0,
        'Tríceps': parseFloat(r['Tríceps'])||0, Deltoides: parseFloat(r.Deltoides)||0,
        'Upper Traps': parseFloat(r['Upper Traps'])||0, Quadriceps: parseFloat(r.Quadriceps)||0,
        Isquiotibiais: parseFloat(r.Isquiotibiais)||0, 'Glúteo': parseFloat(r['Glúteo'])||0,
        Panturrilhas: parseFloat(r.Panturrilhas)||0, ABS: parseFloat(r.ABS)||0
      }
    })).filter(e => e.nome);

    if (exec) DB.exec = exec.map(r => ({
      id: r.ID_Exec, data: fmtData(r.Data),
      id_aluno: r.ID_Aluno, id_treino: r.ID_Treino,
      id_ex: String(r.ID_Exercicio), nome_ex: r.Nome_Exercicio||'',
      idx: parseInt(r.Numero_Serie)-1||0,
      reps: parseInt(r.Reps_Feitas)||0, peso: parseFloat(r.Peso_Kg)||0,
      rir: parseInt(r.RIR)||0, obs: r.Obs||''
    }));

    persist();
    toast('✓ Sincronizado!', '#22c55e');
    renderCurrentPage();
  } catch(e) {
    toast('Erro ao sincronizar', '#ef4444');
  }
  document.getElementById('btn-sync').textContent = '🔄';
}

function fmtData(val) {
  if (!val) return today();
  if (typeof val === 'string' && val.includes('/')) return val;
  const d = new Date(val);
  return isNaN(d) ? String(val) : d.toLocaleDateString('pt-BR');
}

function getSemana(data) {
  const d = data ? new Date(data.split('/').reverse().join('-')) : new Date();
  const oj = new Date(d.getFullYear(),0,1);
  const w = Math.ceil((((d-oj)/86400000)+oj.getDay()+1)/7);
  return `Sem ${String(w).padStart(2,'0')}/${d.getFullYear()}`;
}

// ══ TOAST ══
function toast(msg, color='#fff') {
  const t = document.getElementById('toast');
  t.textContent=msg; t.style.background=color; t.style.color=color==='#fff'?'#000':'#fff';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

// ══ SHEETS ══
function openSheet(id) { const el=document.getElementById(id); el.style.display='flex'; setTimeout(()=>el.classList.add('open'),10); }
function closeSheet(id) { const el=document.getElementById(id); el.classList.remove('open'); setTimeout(()=>el.style.display='none',220); }
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeSheet(o.id)}));

// ══ STATE ══
const ST = { tab:'rotinas', treinoAtivo:null, timer:0, timerInt:null, alunoPerfilId:null, navStack:[], volFiltros:[] };
const GRUPOS = ['Peito','Upper back','Latissimo','Bíceps','Tríceps','Deltoides','Upper Traps','Quadriceps','Isquiotibiais','Glúteo','Panturrilhas','ABS'];

// ══ NAV ══
function goTab(tab) {
  ST.tab = tab; ST.navStack = [];
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.btm-tab').forEach((b,i)=>b.classList.toggle('active',['rotinas','rotinas','alunos','hist'][i]===tab));
  document.getElementById(`page-${tab}`).classList.add('active');
  document.getElementById('nav-title').textContent = {rotinas:'Treino',treino:'Treinamento',alunos:'Alunos',biblioteca:'Exercícios',hist:'Histórico',perfil:'Perfil'}[tab]||'Treino';
  document.getElementById('nav-back').style.display = 'none';
  document.getElementById('btn-add-nav').style.display = 'none';
  if(tab==='rotinas') renderRotinas();
  if(tab==='alunos') { renderAlunos(); setupAlunosNav(); }
  if(tab==='biblioteca') { renderBib(); setupBibNav(); }
  if(tab==='hist') renderHist();
}

function goPage(page, title, addAction) {
  ST.navStack.push(ST.tab==='perfil'?'perfil':ST.tab);
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById('nav-title').textContent = title;
  document.getElementById('nav-back').style.display = 'block';
  document.getElementById('btn-add-nav').style.display = addAction ? 'flex' : 'none';
}

function voltarPagina() {
  const prev = ST.navStack.pop();
  if (prev) goTab(prev);
  else goTab('rotinas');
}

function renderCurrentPage() {
  if(ST.tab==='rotinas') renderRotinas();
  if(ST.tab==='alunos') renderAlunos();
  if(ST.tab==='biblioteca') renderBib();
  if(ST.tab==='hist') renderHist();
}

function setupAlunosNav() {
  document.getElementById('btn-add-nav').style.display = 'flex';
  document.getElementById('btn-add-nav').onclick = () => {
    document.getElementById('sh-aluno-t').textContent = 'Novo Aluno';
    document.getElementById('sh-aluno-id').value = '';
    ['al-nome','al-email','al-tel','al-obs'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('al-nasc').value='';
    document.getElementById('al-obj').value='Hipertrofia';
    document.getElementById('al-ativo').value='Sim';
    openSheet('sh-aluno');
  };
}

function setupBibNav() {
  document.getElementById('btn-add-nav').style.display = 'flex';
  document.getElementById('btn-add-nav').onclick = () => openSheet('sh-ex');
}

function navAddAction() {}

// ══════════════════════════════
// ROTINAS
// ══════════════════════════════
function renderRotinas() {
  const sel = document.getElementById('nr-aluno');
  sel.innerHTML=''; DB.alunos.forEach(a=>sel.innerHTML+=`<option value="${a.id}">${a.nome}</option>`);
  const list = document.getElementById('rotinas-list');
  if (!DB.rotinas.length) {
    list.innerHTML=`<div class="empty"><div class="empty-ico">🏋️</div><div class="empty-t">Nenhuma rotina</div><div class="empty-s">Clique em "Nova Rotina" para começar</div></div>`;
    document.getElementById('rot-lbl').textContent='Minhas Rotinas (0)'; return;
  }
  document.getElementById('rot-lbl').textContent=`Minhas Rotinas (${DB.rotinas.length})`;
  list.innerHTML = DB.rotinas.map(r => {
    const aluno = DB.alunos.find(a=>a.id===r.id_aluno);
    const treinos = DB.treinos.filter(t=>t.id_rotina===r.id).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
    const exNomes = treinos.flatMap(t=>DB.et.filter(e=>e.id_treino===t.id).slice(0,2).map(e=>e.nome)).slice(0,4).join(', ');
    return `<div class="rot-card">
      <div class="rot-card-top">
        <div>
          <div class="rot-card-name">${r.nome}</div>
          <div style="font-size:12px;color:#555;margin-top:2px">${aluno?.nome||'—'} • ${treinos.length} treino(s) ${r.ativa?'<span class="ativa-dot"></span>':''}</div>
        </div>
        <button class="rot-more" onclick="openGerenciarRotina('${r.id}')">⋯</button>
      </div>
      <div class="rot-card-exs">${exNomes||'Nenhum exercício configurado'}</div>
      <div class="treino-letras">${treinos.map(t=>`<button class="btn-letra" onclick="iniciarTreino('${t.id}')">${t.letra}</button>`).join('')}</div>
      <button class="btn-iniciar" onclick="iniciarTreino('${treinos[0]?.id||''}')">Iniciar Rotina</button>
    </div>`;
  }).join('');
}

async function salvarRotina() {
  const nome = document.getElementById('nr-nome').value.trim();
  if (!nome) { toast('Digite o nome!', '#ef4444'); return; }
  const idAluno = document.getElementById('nr-aluno').value;
  const ini = document.getElementById('nr-ini').value;
  const fim = document.getElementById('nr-fim').value;
  const nova = {id:'ROT'+uid(), id_aluno:idAluno, nome, ini, fim, ativa:true, obs:''};
  DB.rotinas.push(nova); persist(); renderRotinas(); closeSheet('sh-nova-rotina');
  document.getElementById('nr-nome').value='';
  toast('✓ Rotina criada!', '#22c55e');
  apiPost('salvarRotina', {ID_Rotina:nova.id, ID_Aluno:idAluno, Nome_Rotina:nome, Data_Inicio:ini, Data_Fim:fim, Ativa:'Sim'});
}

function openGerenciarRotina(rotId) {
  const rot = DB.rotinas.find(r=>r.id===rotId);
  document.getElementById('sh-rot-t').textContent = rot.nome;
  document.getElementById('sh-rot-id').value = rotId;
  document.getElementById('nt-foco').value = '';
  renderSheetTreinos(rotId);
  openSheet('sh-rotina');
}

function renderSheetTreinos(rotId) {
  const treinos = DB.treinos.filter(t=>t.id_rotina===rotId);
  const list = document.getElementById('sh-rot-treinos');
  if (!treinos.length) { list.innerHTML=`<div style="color:#555;font-size:13px;padding:6px 0">Nenhum treino ainda.</div>`; return; }
  list.innerHTML = treinos.map(t => {
    const exCount = DB.et.filter(e=>e.id_treino===t.id).length;
    return `<div class="t-item">
      <div class="t-letra">${t.letra}</div>
      <div class="t-info"><div class="t-nome">Treino ${t.letra}</div><div class="t-foco">${t.foco}</div></div>
      <span class="t-badge">${exCount} ex</span>
      <button onclick="openSheetEt('${t.id}')" style="background:none;border:none;color:#3b82f6;font-size:18px;cursor:pointer;padding:4px;margin-left:4px">💪</button>
      <button class="icon-del" onclick="delTreino('${t.id}')">🗑</button>
    </div>`;
  }).join('');
}

async function salvarTreino() {
  const rotId = document.getElementById('sh-rot-id').value;
  const foco = document.getElementById('nt-foco').value.trim();
  if (!foco) { toast('Digite o foco!', '#ef4444'); return; }
  const letra = document.getElementById('nt-letra').value;
  const novo = {id:'TRE'+uid(), id_rotina:rotId, letra, foco, ordem:DB.treinos.filter(t=>t.id_rotina===rotId).length+1};
  DB.treinos.push(novo); persist(); renderSheetTreinos(rotId); renderRotinas();
  document.getElementById('nt-foco').value='';
  toast('✓ Treino criado!', '#22c55e');
  apiPost('salvarTreino', {ID_Treino:novo.id, ID_Rotina:rotId, Letra_Treino:letra, Nome_Treino:foco, Foco_Muscular:foco, Ordem:novo.ordem});
}

async function delTreino(id) {
  if (!confirm('Excluir este treino?')) return;
  const t = DB.treinos.find(x=>x.id===id);
  DB.et = DB.et.filter(e=>e.id_treino!==id);
  DB.treinos = DB.treinos.filter(x=>x.id!==id);
  persist(); renderSheetTreinos(t.id_rotina); renderRotinas();
  toast('Removido', '#ffd166');
  fetch(API_URL, {method:'POST', body:JSON.stringify({action:'deletarTreino', id})}).catch(()=>{});
}

// ══════════════════════════════
// EXERCÍCIOS DO TREINO
// ══════════════════════════════
function openSheetEt(tid) {
  const t = DB.treinos.find(x=>x.id===tid);
  document.getElementById('sh-et-t').textContent = `Treino ${t.letra} — ${t.foco}`;
  document.getElementById('sh-et-tid').value = tid;
  document.getElementById('et-cfg').style.display = 'none';
  document.getElementById('srch-et').value = '';
  document.getElementById('et-srch-res').innerHTML = '';
  renderSheetEtList(tid);
  openSheet('sh-et');
}

function renderSheetEtList(tid) {
  const exercs = DB.et.filter(e=>e.id_treino===tid).sort((a,b)=>a.ordem-b.ordem);
  const list = document.getElementById('sh-et-list');
  if (!exercs.length) { list.innerHTML=`<div style="color:#555;font-size:13px;padding:4px 0 8px">Nenhum exercício. Busque abaixo.</div>`; return; }
  list.innerHTML = exercs.map((e,i)=>`
    <div class="et-item">
      <div><div style="font-size:13px;font-weight:600;margin-bottom:2px">${i+1}. ${e.nome}</div><div style="font-size:11px;color:#555">${e.series}×${e.rmin}-${e.rmax} reps • ${e.carga}</div></div>
      <button class="icon-del" onclick="delEt('${e.id}','${tid}')">🗑</button>

}

function buildExBlock(ex, tid) {
  const prev = getPrevSeries(ex.id_ex, tid);

function onInp(exId, idx) {
  if(document.getElementById(`sp-${exId}-${idx}`).value) document.getElementById(`sp-${exId}-${idx}`).classList.add('filled');
  if(document.getElementById(`sr2-${exId}-${idx}`).value) document.getElementById(`sr2-${exId}-${idx}`).classList.add('filled');
}

async function checkSerie(exId, idx, tid, idEx, nomeEx) {
  const peso = document.getElementById(`sp-${exId}-${idx}`).value;
  const reps = document.getElementById(`sr2-${exId}-${idx}`).value;
  const chk = document.getElementById(`sc-${exId}-${idx}`);
  const row = document.getElementById(`sr-${exId}-${idx}`);
  const badge = document.getElementById(`sb-${exId}-${idx}`);
  if (chk.classList.contains('checked')) {
    chk.classList.remove('checked'); row.classList.remove('done'); badge.classList.remove('done');
    DB.exec = DB.exec.filter(e=>!(e.id_ex===exId&&e.idx===idx&&e.id_treino===tid&&e.data===today()));
    persist(); updateTreinoStats(tid); return;
  }
  if (!peso||!reps) { toast('Preencha kg e reps!', '#ef4444'); return; }
  chk.classList.add('checked'); row.classList.add('done'); badge.classList.add('done');
  const rot = DB.rotinas.find(r=>DB.treinos.find(t=>t.id===tid)?.id_rotina===r.id);
  const execId = 'EXEC'+uid();
  const reg = {id:execId, data:today(), id_aluno:rot?.id_aluno||'', id_treino:tid, id_ex:exId, nome_ex:nomeEx, idx, reps:parseInt(reps), peso:parseFloat(peso), rir:2, obs:''};
  DB.exec = DB.exec.filter(e=>!(e.id_ex===exId&&e.idx===idx&&e.id_treino===tid&&e.data===today()));
  DB.exec.push(reg); persist(); updateTreinoStats(tid);
  apiPost('salvarExecucao', {ID_Exec:execId, Data:today(), ID_Aluno:rot?.id_aluno||'', ID_Treino:tid, ID_Exercicio:idEx, Nome_Exercicio:nomeEx, Numero_Serie:idx+1, Peso_Kg:parseFloat(peso), Reps_Feitas:parseInt(reps), RIR:2, Obs:'', Semana:getSemana()});
}

function addSerieExtra(exId, tid, idEx, nomeEx) {
  const et = DB.et.find(e=>e.id===exId); if (!et) return;
  et.series++; persist();
  const idx = et.series-1; const prev = getPrevSeries(idEx, tid); const p = prev[idx];
  const block = document.getElementById(`exb-${exId}`); const btn = block.querySelector('.btn-add-s');
  const nr = document.createElement('div'); nr.className='s-row'; nr.id=`sr-${exId}-${idx}`;
  nr.innerHTML=`<div class="s-badge" id="sb-${exId}-${idx}">${idx+1}</div><div class="s-prev">${p?`${p.peso}kg×${p.reps}`:'—'}</div><input type="number" class="s-inp" id="sp-${exId}-${idx}" placeholder="${p?.peso||et.carga.replace(/[^0-9.]/g,'')}" min="0" step="0.5" oninput="onInp('${exId}',${idx})"><input type="number" class="s-inp" id="sr2-${exId}-${idx}" placeholder="${p?.reps||et.rmin}" min="1" oninput="onInp('${exId}',${idx})"><div class="s-chk" id="sc-${exId}-${idx}" onclick="checkSerie('${exId}',${idx},'${tid}','${idEx}','${nomeEx}')"></div>`;
  block.insertBefore(nr, btn);
}

function updateTreinoStats(tid) {
  const todays = DB.exec.filter(e=>e.id_treino===tid&&e.data===today());
  const vol = todays.reduce((s,e)=>s+(e.peso*e.reps),0);
  const vs=document.getElementById('sb-vol'); const ss=document.getElementById('sb-series');
  if(vs) vs.textContent=`${Math.round(vol)} kg`; if(ss) ss.textContent=todays.length;
}

function concluirTreino() { if(confirm('Concluir o treino?')) { clearTimer(); toast('✓ Treino concluído! 💪','#22c55e'); goTab('rotinas'); } }
function clearTimer() { if(ST.timerInt){clearInterval(ST.timerInt);ST.timerInt=null;} ST.treinoAtivo=null; }

function getPrevSeries(idEx, tid) {
  const prev = DB.exec.filter(e=>e.id_ex===idEx&&e.id_treino===tid&&e.data!==today()).sort((a,b)=>b.id.localeCompare(a.id));
  if (!prev.length) return [];
  const lastDate = prev[0].data;
  return DB.exec.filter(e=>e.id_ex===idEx&&e.id_treino===tid&&e.data===lastDate).sort((a,b)=>a.idx-b.idx);
}

function renderPerfil(alunoId) {
  const a = DB.alunos.find(x=>x.id===alunoId);

        <div class="sb-item"><div class="sb-val">${rotinas.length}</div><div class="sb-lbl">Rotinas</div></div>
      </div>
      <div class="perfil-dados">

        ${a.tel?`<div class="perfil-dado"><div class="perfil-dado-lbl">Telefone</div><div class="perfil-dado-val">${a.tel}</div></div>`:''}
        ${a.nasc?`<div class="perfil-dado"><div class="perfil-dado-lbl">Nascimento</div><div class="perfil-dado-val">${a.nasc}</div></div>`:''}
        ${a.obs?`<div class="perfil-dado" style="grid-column:span 2"><div class="perfil-dado-lbl">⚠️ Observações</div><div class="perfil-dado-val">${a.obs}</div></div>`:''}

        📊 Volume Semanal

        <button class="vol-filter-btn active" onclick="toggleFiltroTodos()">Todos</button>

function calcularVolumeSemanal(alunoId) {
  const execAluno = DB.exec.filter(e=>e.id_aluno===alunoId);
  const vol = {};
  execAluno.forEach(e => {
    const sem = getSemana(e.data);
    if (!vol[sem]) { vol[sem]={}; GRUPOS.forEach(g=>vol[sem][g]=0); }
    const ex = DB.exercicios.find(x=>x.id===e.id_ex);
    if (ex?.coef) {
      GRUPOS.forEach(g => { vol[sem][g] += (ex.coef[g]||0); });
    }
  });
  return vol;
}

function renderVolTabela(volSemanal, semanas) {
  const filtrados = ST.volFiltros;
  if (!semanas.length) return `<tr><td colspan="2" style="color:#555;padding:12px;text-align:center">Nenhum dado ainda</td></tr>`;
  const header = `<tr><th>Semana</th>${filtrados.map(g=>`<th>${g.length>6?g.slice(0,6)+'…':g}</th>`).join('')}</tr>`;
  const rows = semanas.map(sem => {
    const d = volSemanal[sem];
    const cells = filtrados.map(g => {
      const v = Math.round(d[g]||0);
      const cls = v===0?'vol-0':v<=4?'vol-low':v<=8?'vol-mid':v<=12?'vol-high':'vol-over';
      return `<td><span class="vol-val ${cls}">${v||'—'}</span></td>`;
    }).join('');
    const semNum = sem.replace('Sem ','').split('/')[0];
    return `<tr><td>Sem ${semNum}</td>${cells}</tr>`;
  }).join('');
  return header + rows;
}

function renderVolGrafico(volSemanal, semanas) {
  if (!semanas.length) return '';
  const totais = semanas.map(sem => {
    const d = volSemanal[sem];
    return {sem, total: Math.round(ST.volFiltros.reduce((s,g)=>s+(d[g]||0),0))};
  });
  const maxVal = Math.max(...totais.map(x=>x.total), 1);
  const bars = totais.slice(-8).map(({sem,total})=>{
    const h = Math.max((total/maxVal)*70, total>0?4:0);
    const semNum = sem.replace('Sem ','').split('/')[0];
    return `<div class="chart-bar-wrap">
      <div class="chart-bar-val">${total}</div>
      <div class="chart-bar" style="height:${h}px"></div>
      <div class="chart-bar-lbl">S${semNum}</div>
    </div>`;
  }).join('');
  return `<div class="chart-wrap"><div class="chart-title">Volume total por semana (séries)</div><div class="chart-bars">${bars}</div></div>`;
}

function toggleFiltro(grupo) {
  const idx = ST.volFiltros.indexOf(grupo);
  if (idx>=0) ST.volFiltros.splice(idx,1);
  else ST.volFiltros.push(grupo);
  const btn = document.getElementById(`vf-${grupo.replace(/\s/g,'-')}`);
  if (btn) btn.classList.toggle('active', ST.volFiltros.includes(grupo));
  atualizarVolume();
}

function toggleFiltroTodos() {
  if (ST.volFiltros.length === GRUPOS.length) {
    ST.volFiltros = [];
    document.querySelectorAll('.vol-filter-btn').forEach(b=>b.classList.remove('active'));
  } else {
    ST.volFiltros = [...GRUPOS];
    document.querySelectorAll('.vol-filter-btn').forEach(b=>b.classList.add('active'));
  }
  atualizarVolume();
}

function atualizarVolume() {
  const vol = calcularVolumeSemanal(ST.alunoPerfilId);
  const semanas = Object.keys(vol).sort();
  const table = document.getElementById('vol-table');
  if (table) table.innerHTML = renderVolTabela(vol, semanas);
  const chartEl = document.querySelector('.chart-wrap');
  if (chartEl) chartEl.outerHTML = renderVolGrafico(vol, semanas);
}

// ══════════════════════════════
// BIBLIOTECA
// ══════════════════════════════
function renderBib() {
  const q = (document.getElementById('srch-bib')?.value||'').toLowerCase();
  const list = document.getElementById('bib-list');
  const exercs = DB.exercicios.filter(e=>!q||e.nome.toLowerCase().includes(q)||e.grupo.toLowerCase().includes(q));
  if (!exercs.length) { list.innerHTML=`<div class="empty"><div class="empty-ico">💪</div><div class="empty-t">Nenhum exercício</div></div>`; return; }
  const grupos = [...new Set(exercs.map(e=>e.grupo))].sort();
  list.innerHTML = grupos.map(g=>`
    <div class="bib-group">
      <div class="bib-group-name">${g}</div>
      ${exercs.filter(e=>e.grupo===g).map(e=>`
        <div class="bib-item">
          <div><div class="bib-name">${e.nome}</div><div class="bib-sub">${e.equip}</div></div>
          <button class="icon-del" onclick="delEx('${e.id}')">🗑</button>
        </div>`).join('')}
    </div>`).join('');
}

async function salvarExercicio() {
  const nome = document.getElementById('ne-nome').value.trim();
  if (!nome) { toast('Digite o nome!', '#ef4444'); return; }
  const grupo = document.getElementById('ne-grupo').value;
  const equip = document.getElementById('ne-equip').value;
  const coef = {
    Peito:parseFloat(document.getElementById('ne-c-peito').value)||0,
    'Upper back':parseFloat(document.getElementById('ne-c-upper').value)||0,
    Latissimo:parseFloat(document.getElementById('ne-c-lat').value)||0,
    'Bíceps':parseFloat(document.getElementById('ne-c-bi').value)||0,
    'Tríceps':parseFloat(document.getElementById('ne-c-tri').value)||0,
    Deltoides:parseFloat(document.getElementById('ne-c-delt').value)||0,
    'Upper Traps':parseFloat(document.getElementById('ne-c-traps').value)||0,
    Quadriceps:parseFloat(document.getElementById('ne-c-quad').value)||0,
    Isquiotibiais:parseFloat(document.getElementById('ne-c-isq').value)||0,
    'Glúteo':parseFloat(document.getElementById('ne-c-glu').value)||0,
    Panturrilhas:parseFloat(document.getElementById('ne-c-pan').value)||0,
    ABS:parseFloat(document.getElementById('ne-c-abs').value)||0
  };
  const novo = {id:'EX'+uid(), nome, grupo, equip, coef};
  DB.exercicios.push(novo); persist(); closeSheet('sh-ex'); renderBib();
  toast('✓ Exercício criado!', '#22c55e');
  document.getElementById('ne-nome').value='';
  apiPost('salvarExercicio', {ID_Exercicio:novo.id, Nome:nome, Grupo_Muscular:grupo, Equipamento:equip, Peito:coef.Peito, 'Upper back':coef['Upper back'], Latissimo:coef.Latissimo, 'Bíceps':coef['Bíceps'], 'Tríceps':coef['Tríceps'], Deltoides:coef.Deltoides, 'Upper Traps':coef['Upper Traps'], Quadriceps:coef.Quadriceps, Isquiotibiais:coef.Isquiotibiais, 'Glúteo':coef['Glúteo'], Panturrilhas:coef.Panturrilhas, ABS:coef.ABS});
}

async function delEx(id) {
  if (!confirm('Excluir da biblioteca?')) return;
  DB.exercicios = DB.exercicios.filter(e=>e.id!==id);
  persist(); renderBib(); toast('Removido', '#ffd166');
}

// ══════════════════════════════
// HISTÓRICO GERAL
// ══════════════════════════════
function renderHist() {
  const list = document.getElementById('hist-list');
  if (!DB.exec.length) { list.innerHTML=`<div class="empty"><div class="empty-ico">📊</div><div class="empty-t">Sem registros</div><div class="empty-s">Inicie um treino para ver o histórico</div></div>`; return; }
  const sorted = [...DB.exec].sort((a,b)=>b.id.localeCompare(a.id));
  const byDate = {};
  sorted.forEach(e=>{ if(!byDate[e.data]) byDate[e.data]={}; if(!byDate[e.data][e.nome_ex]) byDate[e.data][e.nome_ex]=[]; byDate[e.data][e.nome_ex].push(e); });
  list.innerHTML = Object.entries(byDate).slice(0,14).map(([data,exs])=>`
    <div class="hist-date">${data}</div>
    ${Object.entries(exs).map(([nome,series])=>`
      <div class="hist-card">
        <div class="hist-ex-name">${nome}</div>
        <div class="col-hdrs"><span>S</span><span></span><span>KG</span><span>REPS</span><span></span></div>
        ${series.sort((a,b)=>a.idx-b.idx).map((s,i)=>`
          <div class="s-row done">
            <div class="s-badge done">${i+1}</div><div></div>
            <div style="text-align:center;font-size:14px">${s.peso}</div>
            <div style="text-align:center;font-size:14px">${s.reps}</div><div></div>
          </div>`).join('')}
      </div>`).join('')}`).join('');
}

if (API_URL) syncAll();
else renderRotinas();
